name: Check npm build

on:

  pull_request:
    branches:
      - main
    paths:
      - "dist/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read  # Only need read access for checking

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          check-latest: true

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "::error::Built files in dist/ are not up to date. Please run 'npm run build' locally and commit the changes."
            echo "The following files have changes:"
            git status --porcelain dist/
            git diff dist/
            exit 1
          else
            echo "✅ Built files are up to date"
          fi
